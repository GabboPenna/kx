<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">kx — one kubectl workflow across every cluster</title>
  <desc id="desc">Social preview for the kx Kubernetes command line tool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/><stop offset="1" stop-color="#111d2e"/>
    </linearGradient>
    <linearGradient id="blue" x1="110" y1="120" x2="430" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79c0ff"/><stop offset="1" stop-color="#388bfd"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1180" cy="80" r="190" fill="#388bfd" opacity=".08"/>
  <circle cx="1100" cy="590" r="260" fill="#7ee787" opacity=".05"/>
  <g filter="url(#shadow)">
    <rect x="84" y="94" width="452" height="452" rx="100" fill="#0d1117" stroke="#30363d" stroke-width="3"/>
    <path d="M196 196v248m0-90 98-92m-79 74 83 108" fill="none" stroke="url(#blue)" stroke-width="43" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m326 272 99 172m0-172-99 172" fill="none" stroke="#f0f6fc" stroke-width="43" stroke-linecap="round"/>
    <g fill="#7ee787" stroke="#0d1117" stroke-width="5">
      <circle cx="196" cy="196" r="19"/><circle cx="425" cy="272" r="19"/><circle cx="425" cy="444" r="19"/>
    </g>
  </g>
  <text x="620" y="280" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="170" font-weight="700" letter-spacing="-15">kx</text>
  <text x="630" y="354" fill="#79c0ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="37" font-weight="650">One kubectl workflow</text>
  <text x="630" y="404" fill="#c9d1d9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="37" font-weight="500">across every cluster.</text>
  <g transform="translate(630 463)">
    <rect width="134" height="46" rx="23" fill="#1f6feb"/><text x="67" y="31" fill="white" text-anchor="middle" font-family="ui-monospace, monospace" font-size="21" font-weight="700">@selector</text>
    <rect x="148" width="104" height="46" rx="23" fill="#238636"/><text x="200" y="31" fill="white" text-anchor="middle" font-family="ui-monospace, monospace" font-size="21" font-weight="700">matrix</text>
    <rect x="266" width="78" height="46" rx="23" fill="#30363d"/><text x="305" y="31" fill="#f0f6fc" text-anchor="middle" font-family="ui-monospace, monospace" font-size="21" font-weight="700">why</text>
  </g>
</svg>
