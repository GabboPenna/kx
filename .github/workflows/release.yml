name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tags must use SemVer: vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          export COMMIT="${COMMIT::12}"
          export DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sh scripts/build-release.sh
          sh scripts/render-krew-manifest.sh "$VERSION" dist/checksums.txt > dist/kx-krew.yaml

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=(--verify-tag --generate-notes --title "kx ${GITHUB_REF_NAME}")
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            dist/kx-linux-amd64.tar.gz \
            dist/kx-linux-arm64.tar.gz \
            dist/checksums.txt \
            dist/kx-krew.yaml \
            "${flags[@]}"
